services:
  - type: web
    name: ticket-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate"
    startCommand: "gunicorn your_project_name.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: ticket-db
    plan: free